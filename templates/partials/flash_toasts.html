{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="client-toast-stack" role="alert" aria-live="polite">
  {% for category, message in messages %}
  <div class="client-toast client-toast--{{ category }}" data-client-toast>
    <span class="client-toast-icon" aria-hidden="true">
      {% if category == 'error' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      {% else %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      {% endif %}
    </span>
    <p class="client-toast-message">{{ message }}</p>
    <button type="button" class="client-toast-dismiss" aria-label="Dismiss notification">&times;</button>
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}
