{% extends "layout_workspace.html" %}
{% block title %}Change password — Kryx Client{% endblock %}
{% block page %}
<section class="client-page-shell admin-shell max-w-lg">
  <h1 class="text-2xl font-bold mb-2">Change password</h1>
  {% if forced %}
  <p class="login-flash login-flash--info mb-4">You must set a new password before continuing.</p>
  {% endif %}
  <form method="post" class="admin-panel admin-panel--raised admin-form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label class="login-field"><span class="login-label">Current password</span><input class="login-input" type="password" name="current_password" required autocomplete="current-password" /></label>
    <label class="login-field"><span class="login-label">New password</span><input class="login-input" type="password" name="new_password" required autocomplete="new-password" minlength="8" /></label>
    <label class="login-field"><span class="login-label">Confirm new password</span><input class="login-input" type="password" name="confirm_password" required autocomplete="new-password" minlength="8" /></label>
    <button type="submit" class="btn-primary">Update password</button>
  </form>
</section>
{% endblock %}
