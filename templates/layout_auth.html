{% extends "root.html" %}
{% block body_class %} page-client-auth{% endblock %}
{% block layout %}
<div class="min-h-screen page-dots-shell login-page client-auth-shell">
  {% include "partials/page_dots_background.html" %}
  <div class="client-auth-ambient" aria-hidden="true">
    <span class="client-auth-orb client-auth-orb--a"></span>
    <span class="client-auth-orb client-auth-orb--b"></span>
    <span class="client-auth-orb client-auth-orb--c"></span>
  </div>
  <section class="login-page-shell px-6 py-12 md:py-16 client-auth-main">
    {% block page %}{% endblock %}
  </section>
  {% include "partials/flash_toasts.html" %}
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='hero-dots-interaction.js') }}" defer></script>
<script src="{{ url_for('static', filename='client-auth.js') }}" defer></script>
<script src="{{ url_for('static', filename='client-toasts.js') }}" defer></script>
{% endblock %}
