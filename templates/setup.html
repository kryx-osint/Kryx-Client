{% extends "layout_auth.html" %}
{% block title %}Setup — Kryx Client{% endblock %}
{% block page %}
<div class="login-card-wrap">
  <div class="login-card-head">
    <p class="text-xs font-mono uppercase tracking-wider text-cyan-400 mb-2">First run</p>
    <h1 class="text-2xl font-bold mb-2">Kryx Client setup</h1>
    <p class="text-sm text-muted-foreground">Connect this app to your Kryx API key. Team searches share your Kryx credits.</p>
  </div>
  <form class="login-form" method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label class="login-field">
      <span class="login-label">Organization logo <span class="text-muted-foreground">(optional)</span></span>
      <div class="client-setup-logo-row">
        <img
          src="{{ url_for('static', filename='logo.svg') }}"
          alt=""
          width="52"
          height="52"
          class="client-setup-logo-preview"
          id="setup-logo-preview"
        />
        <div class="client-setup-logo-upload">
          <input
            class="login-input client-setup-logo-input"
            type="file"
            name="logo"
            id="setup-logo-input"
            accept="image/png,image/jpeg,image/webp,image/svg+xml,.svg"
          />
          <span class="login-help">PNG, JPG, WebP, or SVG up to 2 MB. Leave empty to use the default Kryx logo.</span>
        </div>
      </div>
    </label>
    <label class="login-field">
      <span class="login-label">Kryx server URL</span>
      <input class="login-input" name="kryx_url" required placeholder="http://127.0.0.1:8989" value="{{ config.kryx_url or '' }}" />
    </label>
    <label class="login-field">
      <span class="login-label">Kryx API token</span>
      <input class="login-input" name="api_token" required placeholder="kryx_live_…" autocomplete="off" />
      <span class="login-help">From Kryx → API Access. Full token starting with <code>kryx_live_</code>.</span>
    </label>
    <label class="login-field">
      <span class="login-label">Organization name</span>
      <input class="login-input" name="organization_name" value="{{ config.organization_name or 'My team' }}" />
    </label>
    <label class="login-field">
      <span class="login-label">Owner username</span>
      <input class="login-input" name="owner_username" required value="{{ config.owner_username or 'owner' }}" />
    </label>
    <label class="login-field">
      <span class="login-label">Owner password</span>
      <input class="login-input" type="password" name="owner_password" required autocomplete="new-password" />
      <span class="login-help">Used to sign in and manage team members on this client app.</span>
    </label>
    <button type="submit" class="btn-primary btn-block">Save &amp; connect</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
{{ super() }}
<script>
(function () {
  var input = document.getElementById("setup-logo-input");
  var preview = document.getElementById("setup-logo-preview");
  if (!input || !preview) return;
  input.addEventListener("change", function () {
    var file = input.files && input.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
  });
})();
</script>
{% endblock %}
